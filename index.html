<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charlie Heal — Melrose Park Merino</title>
<meta name="description" content="Charlie Heal, Director of Melrose Park Merino. Wirrate, Victoria, Australia.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#2D4A3E;
    --green-deep:#243d33;
    --sage:#8FB089;
    --sage-soft:#a9c4a3;
    --cream:#F5F0E8;
    --cream-dim:#cdd2c5;
    --rule:rgba(245,240,232,0.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--green);
    color:var(--cream);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 28px;
    line-height:1.5;
    overflow-x:hidden;
  }

  /* Subtle topographic / fleece texture via layered radial gradients */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(143,176,137,0.10), transparent 60%),
      radial-gradient(90% 60% at 50% 115%, rgba(36,61,51,0.55), transparent 55%);
    pointer-events:none;
    z-index:0;
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    text-align:center;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .logo{
    width:36px;height:30px;
    margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;
  }
  .logo img{width:100%;height:100%;object-fit:contain;display:block}
  .eyebrow{
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--sage);
    margin-bottom:26px;
    font-weight:500;
  }

  h1{
    font-family:'Fraunces',serif;
    font-weight:400;
    font-size:clamp(40px,12vw,56px);
    line-height:1.02;
    letter-spacing:.01em;
    color:var(--cream);
  }

  .role{
    font-family:'Fraunces',serif;
    font-weight:300;
    font-style:italic;
    font-size:clamp(17px,5vw,20px);
    color:var(--sage-soft);
    margin-top:14px;
  }

  .rule{
    width:46px;
    height:1px;
    background:var(--sage);
    margin:30px auto 30px;
    opacity:.6;
  }

  .location{
    font-size:13px;
    letter-spacing:.04em;
    color:var(--cream-dim);
    margin-bottom:40px;
  }

  .actions{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:34px;
  }
  .btn{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 20px;
    border:1px solid var(--rule);
    border-radius:14px;
    color:var(--cream);
    text-decoration:none;
    font-size:15px;
    letter-spacing:.01em;
    background:rgba(245,240,232,0.015);
    transition:border-color .25s ease, background .25s ease, transform .25s ease;
  }
  .btn:hover,.btn:focus-visible{
    border-color:var(--sage);
    background:rgba(143,176,137,0.10);
    transform:translateY(-2px);
    outline:none;
  }
  .btn:focus-visible{outline:2px solid var(--sage);outline-offset:3px}
  .btn .ico{flex:0 0 22px;color:var(--sage);display:flex}
  .btn .label{flex:1;text-align:left;font-weight:500}
  .btn .val{text-align:left;font-size:13px;color:var(--cream-dim);margin-top:1px;font-weight:400}
  .btn .arrow{flex:0 0 auto;color:var(--sage-soft);opacity:.6;transition:transform .25s ease}
  .btn:hover .arrow{transform:translateX(3px)}
  .btn .stack{flex:1;text-align:left;display:flex;flex-direction:column}

  .socials{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-bottom:42px;
  }
  .social{
    width:52px;height:52px;
    border:1px solid var(--rule);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--cream);
    transition:border-color .25s ease, background .25s ease, transform .25s ease, color .25s ease;
  }
  .social:hover,.social:focus-visible{
    border-color:var(--sage);
    background:var(--sage);
    color:var(--green-deep);
    transform:translateY(-2px);
    outline:none;
  }
  .social:focus-visible{outline:2px solid var(--sage);outline-offset:3px}
  .social svg{width:22px;height:22px}

  footer{
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:rgba(245,240,232,0.4);
  }
  footer a{color:var(--sage-soft);text-decoration:none}
  footer a:hover{text-decoration:underline}

  @media (prefers-reduced-motion: reduce){
    .card{animation:none}
    .btn,.social,.arrow{transition:none}
  }
</style>
</head>
