<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charlie Heal — Melrose Park Merino</title>
<meta name="description" content="Charlie Heal, Director of Melrose Park Merino. Wirrate, Victoria, Australia.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#2D4A3E;
    --green-deep:#243d33;
    --sage:#8FB089;
    --sage-soft:#a9c4a3;
    --cream:#F5F0E8;
    --cream-dim:#cdd2c5;
    --rule:rgba(245,240,232,0.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--green);
    color:var(--cream);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 28px;
    line-height:1.5;
    overflow-x:hidden;
  }

  /* Subtle topographic / fleece texture via layered radial gradients */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(143,176,137,0.10), transparent 60%),
      radial-gradient(90% 60% at 50% 115%, rgba(36,61,51,0.55), transparent 55%);
    pointer-events:none;
    z-index:0;
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    text-align:center;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .eyebrow{
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--sage);
    margin-bottom:26px;
    font-weight:500;
  }

  h1{
    font-family:'Fraunces',serif;
    font-weight:400;
    font-size:clamp(40px,12vw,56px);
    line-height:1.02;
    letter-spacing:.01em;
    color:var(--cream);
  }

  .role{
    font-family:'Fraunces',serif;
    font-weight:300;
    font-style:italic;
    font-size:clamp(17px,5vw,20px);
    color:var(--sage-soft);
    margin-top:14px;
  }

  .rule{
    width:46px;
    height:1px;
    background:var(--sage);
    margin:30px auto 30px;
    opacity:.6;
  }

  .location{
    font-size:13px;
    letter-spacing:.04em;
    color:var(--cream-dim);
    margin-bottom:40px;
  }

  .actions{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:34px;
  }
  .btn{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 20px;
    border:1px solid var(--rule);
    border-radius:14px;
    color:var(--cream);
    text-decoration:none;
    font-size:15px;
    letter-spacing:.01em;
    background:rgba(245,240,232,0.015);
    transition:border-color .25s ease, background .25s ease, transform .25s ease;
  }
  .btn:hover,.btn:focus-visible{
    border-color:var(--sage);
    background:rgba(143,176,137,0.10);
    transform:translateY(-2px);
    outline:none;
  }
  .btn:focus-visible{outline:2px solid var(--sage);outline-offset:3px}
  .btn .ico{flex:0 0 22px;color:var(--sage);display:flex}
  .btn .label{flex:1;text-align:left;font-weight:500}
  .btn .val{text-align:left;font-size:13px;color:var(--cream-dim);margin-top:1px;font-weight:400}
  .btn .arrow{flex:0 0 auto;color:var(--sage-soft);opacity:.6;transition:transform .25s ease}
  .btn:hover .arrow{transform:translateX(3px)}
  .btn .stack{flex:1;text-align:left;display:flex;flex-direction:column}

  .socials{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-bottom:42px;
  }
  .social{
    width:52px;height:52px;
    border:1px solid var(--rule);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--cream);
    transition:border-color .25s ease, background .25s ease, transform .25s ease, color .25s ease;
  }
  .social:hover,.social:focus-visible{
    border-color:var(--sage);
    background:var(--sage);
    color:var(--green-deep);
    transform:translateY(-2px);
    outline:none;
  }
  .social:focus-visible{outline:2px solid var(--sage);outline-offset:3px}
  .social svg{width:22px;height:22px}

  footer{
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:rgba(245,240,232,0.4);
  }
  footer a{color:var(--sage-soft);text-decoration:none}
  footer a:hover{text-decoration:underline}

  @media (prefers-reduced-motion: reduce){
    .card{animation:none}
    .btn,.social,.arrow{transition:none}
  }
</style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Melrose Park Merino</p>
    <h1>Charlie Heal</h1>
    <p class="role">Director</p>

    <div class="rule"></div>
    <p class="location">Wirrate, Victoria · Australia</p>

    <nav class="actions">
      <a class="btn" href="mailto:charlie.heal@gmail.com">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="4.5" width="19" height="15" rx="2.5"/><path d="m3 6 9 6 9-6"/></svg>
        </span>
        <span class="stack">
          <span class="label">Email</span>
          <span class="val">charlie.heal@gmail.com</span>
        </span>
        <span class="arrow" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </span>
      </a>

      <a class="btn" href="tel:+61408522902">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 3.5h3l1.5 4-2 1.5a12 12 0 0 0 5.5 5.5l1.5-2 4 1.5v3a2 2 0 0 1-2.2 2A16.5 16.5 0 0 1 4.5 5.7 2 2 0 0 1 6.5 3.5Z"/></svg>
        </span>
        <span class="stack">
          <span class="label">Call</span>
          <span class="val">+61 408 522 902</span>
        </span>
        <span class="arrow" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </span>
      </a>

      <a class="btn" href="https://www.charlieheal.com" target="_blank" rel="noopener">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        </span>
        <span class="stack">
          <span class="label">Website</span>
          <span class="val">charlieheal.com</span>
        </span>
        <span class="arrow" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </span>
      </a>
    </nav>

    <div class="socials">
      <a class="social" href="https://www.instagram.com/melrosepark_merino/" target="_blank" rel="noopener" aria-label="Melrose Park Merino on Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/></svg>
      </a>
      <a class="social" href="https://www.linkedin.com/in/charlie-heal-189b7b91/" target="_blank" rel="noopener" aria-label="Charlie Heal on LinkedIn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.98 3.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5ZM3 9h4v12H3V9Zm6 0h3.8v1.7h.05c.53-1 1.83-2.05 3.77-2.05C20.3 8.65 21 11 21 14v7h-4v-6.2c0-1.48-.03-3.38-2.06-3.38-2.06 0-2.38 1.6-2.38 3.27V21H9V9Z"/></svg>
      </a>
    </div>

    <footer>Wirrate · <a href="https://www.charlieheal.com" target="_blank" rel="noopener">charlieheal.com</a></footer>
  </main>
</body>
</html>
